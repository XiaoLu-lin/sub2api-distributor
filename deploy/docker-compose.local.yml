services:
  sub2api-distributor:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_MAIN_APP_BASE_URL: ${VITE_MAIN_APP_BASE_URL:-}
    container_name: sub2api-distributor
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8091}:8091"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - SERVER_PORT=8091
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - STATIC_DIR=/app/web
      - TZ=${TZ:-Asia/Shanghai}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
